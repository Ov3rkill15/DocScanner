name: coba_aplikasi_flutter
description: "DocScanner - Smart Document Scanner App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Camera & Image
  camera: ^0.10.5+9
  image: ^4.1.3
  image_picker: ^1.0.7

  # PDF
  pdf: ^3.10.7
  printing: ^5.12.0

  # OCR
  google_mlkit_text_recognition: ^0.15.1

  # File & Storage
  path_provider: ^2.1.0
  path: ^1.9.0
  permission_handler: ^11.3.0
  share_plus: ^12.0.1

  # Signature
  signature: ^5.4.1

  # Google Drive (Cloud Sync)
  googleapis: ^12.0.0
  googleapis_auth: ^1.5.1
  google_sign_in: ^6.2.1

  # UI & State
  provider: ^6.1.1
  uuid: ^4.3.3
  intl: ^0.19.0
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#203060"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
